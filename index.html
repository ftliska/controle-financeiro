<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle Financeiro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">

  <h1>Controle Financeiro</h1>

  <!-- FORM -->
  <div class="form">
    <select id="tipo">
      <option value="receita">Receita</option>
      <option value="despesa">Despesa</option>
    </select>

    <input id="descricao" placeholder="Descrição">

    <input id="valor" placeholder="R$ 0,00">

    <input type="date" id="data">

    <button onclick="adicionarLancamento()">Adicionar</button>
  </div>

  <!-- RESUMO -->
  <div class="resumo">
    <p>Entradas: <span id="entradas">R$ 0</span></p>
    <p>Saídas: <span id="saidas">R$ 0</span></p>
    <p>Saldo: <span id="saldo">R$ 0</span></p>
  </div>

  <!-- GRÁFICO -->
  <canvas id="grafico"></canvas>

  <!-- LISTA -->
  <div id="lista"></div>

</div>

<script src="script.js" defer></script>
</body>
</html>
